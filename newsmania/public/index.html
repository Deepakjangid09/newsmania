<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsmania — The Morning Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- MASTHEAD -->
  <header class="masthead">
    <div class="masthead-top">
      <div class="masthead-meta">
        <span id="live-date"></span>
        <span class="dot">·</span>
        <span id="live-time"></span>
      </div>
      <div class="masthead-title">
        <div class="masthead-rule"></div>
        <h1>Newsmania</h1>
        <p class="masthead-tagline">All the world's headlines. One place.</p>
        <div class="masthead-rule"></div>
      </div>
      <div class="masthead-actions">
        <button class="icon-btn" id="btn-search"    title="Search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        </button>
        <button class="icon-btn" id="btn-screenshot" title="Screenshot">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/><line x1="3" y1="9" x2="6" y2="9"/><line x1="18" y1="9" x2="21" y2="9"/></svg>
        </button>
        <button class="icon-btn" id="btn-notes"     title="Notes">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>
        </button>
        <button class="icon-btn" id="btn-dark"      title="Dark Mode">
          <svg viewBox="0 0 24 24" id="dark-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>

    <!-- Category Nav -->
    <nav class="category-nav">
      <button class="cat-btn active" data-cat="all">All</button>
      <button class="cat-btn" data-cat="india">India</button>
      <button class="cat-btn" data-cat="world">World</button>
      <button class="cat-btn" data-cat="tech">Technology</button>
      <button class="cat-btn" data-cat="business">Business</button>
      <button class="cat-btn" data-cat="sports">Sports</button>
      <button class="cat-btn" data-cat="science">Science</button>
      <button class="cat-btn" data-cat="entertainment">Entertainment</button>
    </nav>
  </header>

  <!-- SEARCH BAR -->
  <div class="search-bar" id="search-bar">
    <div class="search-inner">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      <input type="text" id="search-input" placeholder="Search across all sources…" autocomplete="off">
      <button id="search-close">✕</button>
    </div>
  </div>

  <!-- TICKER -->
  <div class="ticker-wrap" id="ticker-wrap">
    <span class="ticker-label">LIVE</span>
    <div class="ticker-inner">
      <div class="ticker-track" id="ticker-track">
        <span class="ticker-placeholder">Loading latest headlines…</span>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="main-grid" id="main-grid">
    <div class="loader" id="loader">
      <div class="loader-press">
        <div class="loader-bar"></div>
        <div class="loader-bar"></div>
        <div class="loader-bar"></div>
        <div class="loader-bar"></div>
      </div>
      <p>Fetching the morning edition…</p>
    </div>
    <div id="news-container"></div>
  </main>

  <!-- NOTES PANEL -->
  <aside class="notes-panel" id="notes-panel">
    <div class="panel-header">
      <h2>My Notes</h2>
      <button class="panel-close" id="notes-close">✕</button>
    </div>
    <button class="add-note-btn" id="add-note-btn">+ New Note</button>
    <div class="notes-list" id="notes-list"></div>
  </aside>

  <!-- NOTE EDITOR MODAL -->
  <div class="modal-overlay" id="note-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title">New Note</h3>
        <button class="modal-close" id="note-modal-close">✕</button>
      </div>
      <input type="text"     id="note-title-input"   class="modal-input" placeholder="Title…">
      <textarea              id="note-content-input" class="modal-textarea" placeholder="Write your thoughts…" rows="6"></textarea>
      <div class="note-colors" id="note-colors">
        <span class="color-dot active" data-color="#f9ca24" style="background:#f9ca24"></span>
        <span class="color-dot" data-color="#fd9644" style="background:#fd9644"></span>
        <span class="color-dot" data-color="#ee5a24" style="background:#ee5a24"></span>
        <span class="color-dot" data-color="#0652DD" style="background:#0652DD"></span>
        <span class="color-dot" data-color="#1289A7" style="background:#1289A7"></span>
        <span class="color-dot" data-color="#55efc4" style="background:#55efc4"></span>
        <span class="color-dot" data-color="#a29bfe" style="background:#a29bfe"></span>
        <span class="color-dot" data-color="#2d3436" style="background:#2d3436"></span>
      </div>
      <input type="hidden" id="note-id">
      <input type="hidden" id="note-article-url">
      <input type="hidden" id="note-article-title">
      <div class="modal-actions">
        <button class="btn-cancel" id="note-cancel">Cancel</button>
        <button class="btn-save"   id="note-save">Save Note</button>
      </div>
    </div>
  </div>

  <!-- SCREENSHOT TOAST -->
  <div class="toast" id="toast"></div>

  <!-- BACK TO TOP -->
  <button class="back-top" id="back-top" title="Back to top">↑</button>

  <!-- jQuery + app -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
